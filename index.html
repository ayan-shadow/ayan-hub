<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayan Mega Hub</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .header {
            color: #00ffcc;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            text-transform: uppercase;
            border-bottom: 2px solid #00ffcc;
            padding-bottom: 10px;
        }
        .card {
            background: #111;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .user-info {
            font-size: 18px;
            margin-bottom: 10px;
        }
        .credits {
            font-size: 48px;
            color: #ffcc00;
            font-weight: bold;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }
        .btn-green { background-color: #00ffcc; color: #000; }
        .btn-dark { background-color: #222; color: #00ffcc; border: 1px solid #00ffcc; }
        .btn-red { background-color: #ff0055; color: #fff; }
        #login-btn {
            background: white;
            color: black;
            padding: 10px 20px;
            border-radius: 5px;
            float: right;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <div id="login-section">
        <div id="login-btn" onclick="googleLogin()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> Login
        </div>
    </div>

    <div class="header">Ayan Mega Hub</div>

    <div class="card">
        <div class="user-info" id="userName">Welcome, Guest</div>
        <div class="credits" id="userCredits">0</div>
        <div style="color: #888;">Available Credits</div>
    </div>

    <button class="btn btn-green">Video Downloader (YT/Insta)</button>
    <button class="btn btn-dark">Game Logic & Scripts</button>
    <a href="https://t.me/your_telegram" class="btn btn-red">Contact Ayan (Telegram)</a>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDtNMBDNRVkfNBuJRJeNJIXc_5mS9oK9zk",
            authDomain: "ayanmegaweb.firebaseapp.com",
            projectId: "ayanmegaweb",
            storageBucket: "ayanmegaweb.firebasestorage.app",
            messagingSenderId: "801336838090",
            appId: "1:801336838090:web:fadc71f3106b072e4c3133",
            measurementId: "G-4JDWL4YZR"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Google Login Function
        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then((result) => {
                    alert("Namaste Boss " + result.user.displayName);
                    window.location.reload();
                })
                .catch((error) => {
                    alert("Error: " + error.message);
                });
        }

        // Check Login Status
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('userName').innerText = "Welcome, " + user.displayName;
                document.getElementById('userCredits').innerText = "Unlimited"; 
                document.getElementById('login-section').style.display = "none";
            }
        });
    </script>
</body>
</html>
